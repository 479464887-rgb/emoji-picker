    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --success: #3fb950;
            --danger: #f85149;
            --radius: 6px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 16px; }
        .header a:hover { color: var(--accent); }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 24px;
            flex: 1;
            width: 100%;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #f0f6fc;
        }
        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 16px;
        }
        .card h2 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #f0f6fc;
        }
        textarea, input[type="text"], input[type="number"], select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            color: var(--text);
            font-size: 14px;
            font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
            resize: vertical;
            transition: border-color 0.15s;
        }
        textarea:focus, input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }
        button {
            background: #238636;
            color: #fff;
            border: 1px solid rgba(240, 246, 252, 0.1);
            border-radius: var(--radius);
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }
        button:hover { background: #2ea043; }
        button.secondary {
            background: var(--surface);
            border: 1px solid var(--border);
        }
        button.secondary:hover { background: #30363d; }
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }
        .feature-tag {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .output {
            margin-top: 16px;
            word-break: break-all;
        }
        .footer {
            text-align: center;
            padding: 24px;
            color: var(--text-secondary);
            font-size: 12px;
            border-top: 1px solid var(--border);
        }
        .footer a { color: var(--accent); text-decoration: none; }
        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .copied { color: var(--success); font-size: 12px; margin-left: 8px; opacity: 0; transition: opacity 0.3s; }
        .copied.show { opacity: 1; }
        .label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }
/* 响应式设计 */
@media (max-width: 768px) {
  body { padding: 12px; }
  header { padding: 12px 16px; flex-direction: column; }

  h1 { font-size: 1.5rem; }

  .card { padding: 12px; }
}    </style>

    {cat:'Objects', emojis:['⌚','📱','💻','⌨','🖥','🖨','🖱','🖲','🕹','🗜','💽','💾','💿','📀','📼','📷','📸','📹','🎥','📽','🎞','📞','☎','📟','📠','📺','📻','🎙','🎚','🎛','🧭','⏱','⏲','⏰','🕰','⌛','📡','🔋','🔌','💡','🔦','🕯','🪔','🧯','🗑','🛢','💸','💵','💴','💶','💷','🪙','💰','💳','💎','⚖','🪜','🧰','🪛','🔧','🔨','⚒','🛠','⛏','🪚','🔩','⚙','🪤','🧱','⛓','🧲','🔫','💣','🧨','🪓','🔪','🗡','⚔','🛡','🚬','⚰','🪦','⚱','🏺','🔮','📿','🧿','💈','⚗','🔭','🔬','🕳','🩹','🩺','💊','💉','🩸','🧬','🦠','🧫','🧪','🌡','🧹','🪠','🧺','🧻','🚽','🚰','🚿','🛁','🛀','🧼','🪥','🪒','🧽','🪣','🧴','🛎','🔑','🗝','🚪','🪑','🛋','🛏','🛌','🧸','🪆','🖼','🪞','🪟','🛍','🛒','🎁','🎈','🎏','🎀','🪄','🪅','🎊','🎉','🎎','🏮','🎐','🧧','✉','📩','📨','📧','💌','📥','📤','📦','🏷','🪧','📪','📫','📬','📭','📮','📯','📜','📃','📄','📑','🧾','📊','📈','📉','🗒','🗓','📆','📅','🗑','📇','🗃','🗳','🗄','📋','📁','📂','🗂','🗞','📰','📓','📔','📒','📕','📗','📘','📙','📚','📖','🔖','🧷','🔗','📎','🖇','📐','📏','🧮','📌','📍','✂','🖊','🖋','✒','🖌','🖍','📝','✏','🔍','🔎','🔏','🔐','🔒','🔓']},

];

const search = document.getElementById('emoji-search');
const grid = document.getElementById('emoji-grid');
const btns = document.getElementById('cat-btns');
const recent = JSON.parse(localStorage.getItem('emoji-recent') || '[]');

function render(filter='') {
    const q = filter.toLowerCase();
    let all = [];
    EMOJIS.forEach(cat => {
        cat.emojis.forEach(e => {
            if (!q || e.includes(q) || cat.cat.toLowerCase().includes(q)) {
                all.push(e);
            }
        });
    });
    if (recent.length && !q) {
        all = [...new Set([...recent, ...all])];
    }
    grid.innerHTML = all.slice(0, 200).map(e =>
        `<span onclick="copyEmoji('${e}', this)" style="font-size:28px;cursor:pointer;padding:8px;border-radius:4px;transition:background 0.15s;" onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background=''">${e}</span>`
    ).join('');
}

function copyEmoji(emoji, el) {
    navigator.clipboard.writeText(emoji);
    const update = [emoji, ...recent.filter(e => e !== emoji)].slice(0, 20);
    localStorage.setItem('emoji-recent', JSON.stringify(update));
    recent.length = 0; recent.push(...update);
    el.style.transform = 'scale(1.3)';
    setTimeout(() => el.style.transform = '', 200);
}

btns.innerHTML = EMOJIS.map(c => 
    `<button class="secondary" onclick="filterCat('${c.cat}')" style="font-size:12px;padding:4px 10px;">${c.emojis[0]} ${c.cat}</button>`
).join('');

function filterCat(cat) {
    const c = EMOJIS.find(x => x.cat === cat);
    if (c) {
        grid.innerHTML = c.emojis.map(e =>
            `<span onclick="copyEmoji('${e}', this)" style="font-size:28px;cursor:pointer;padding:8px;border-radius:4px;" onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background=''">${e}</span>`
        ).join('');
    }
}

search.addEventListener('input', () => render(search.value));
render();

        navigator.clipboard.writeText(text).then(() => {
            var orig = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = orig, 1500);
